<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>i love you</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            overscroll-behavior: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let W, H, CX, CY, SCALE, DPR, IS_SMALL;

        function resize() {
            // Cap DPR at 2 so very-high-density phones stay fast but crisp
            DPR = Math.min(window.devicePixelRatio || 1, 2);

            W = window.innerWidth;
            H = window.innerHeight;

            // Backing store at device resolution -> no more blur on mobile
            canvas.width = Math.round(W * DPR);
            canvas.height = Math.round(H * DPR);
            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';

            // Draw in CSS-pixel coordinates, scaled up by DPR
            ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

            CX = W / 2;
            CY = H / 2;
            SCALE = Math.min(W, H) / 42;
            IS_SMALL = Math.min(W, H) < 500; // phones
        }
        resize();

        // Debounce resize + handle orientation changes on any device
        let resizeTimer;
        function onResize() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => { resize(); buildParticles(); }, 150);
        }
        window.addEventListener('resize', onResize);
        window.addEventListener('orientationchange', onResize);

        // Classic parametric heart curve
        function heartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t)
                - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x, y };
        }

        // Point-in-heart test using the implicit heart equation
        function insideHeart(x, y) {
            const nx = x / 16;
            const ny = -y / 13;
            const a = nx * nx + ny * ny - 1;
            return a * a * a - nx * nx * ny * ny * ny < 0;
        }

        const PHRASE = 'i love you';
        let particles = [];

        function buildParticles() {
            particles = [];

            // Fewer particles on small screens: keeps phones smooth
            // and stops the words overlapping into a blob
            const density = IS_SMALL ? 0.6 : 1;

            const layers = [
                { scale: 1.00, count: 130, size: 1.00, alpha: 0.95 },
                { scale: 0.88, count: 110, size: 0.92, alpha: 0.85 },
                { scale: 0.76, count: 95, size: 0.85, alpha: 0.75 },
                { scale: 0.64, count: 80, size: 0.78, alpha: 0.65 },
                { scale: 0.52, count: 65, size: 0.72, alpha: 0.55 },
                { scale: 0.40, count: 50, size: 0.66, alpha: 0.50 },
                { scale: 0.28, count: 35, size: 0.60, alpha: 0.45 }
            ];

            layers.forEach(layer => {
                const count = Math.round(layer.count * density);
                for (let i = 0; i < count; i++) {
                    const t = (i / count) * Math.PI * 2;
                    const p = heartPoint(t);
                    addParticle(
                        (p.x * layer.scale) + (Math.random() - 0.5) * 1.2,
                        (p.y * layer.scale) + (Math.random() - 0.5) * 1.2,
                        layer.size,
                        layer.alpha * (0.7 + Math.random() * 0.3)
                    );
                }
            });

            // Random fill inside the heart
            const FILL = Math.round(260 * density);
            let attempts = 0, placed = 0;
            while (placed < FILL && attempts < FILL * 30) {
                attempts++;
                const x = (Math.random() - 0.5) * 36;
                const y = (Math.random() - 0.5) * 34;
                if (insideHeart(x, y)) {
                    addParticle(x, y, 0.5 + Math.random() * 0.5, 0.25 + Math.random() * 0.45);
                    placed++;
                }
            }
        }

        function addParticle(hx, hy, size, alpha) {
            const homeX = CX + hx * SCALE;
            const homeY = CY + hy * SCALE;
            // Smaller drift orbits on phones so the heart holds its shape
            const driftMax = IS_SMALL ? 4 : 7;
            particles.push({
                homeX, homeY,
                x: homeX, y: homeY,
                vx: 0, vy: 0,
                size,
                alpha,
                phase: Math.random() * Math.PI * 2,
                flicker: 0.4 + Math.random() * 0.6,
                driftR: 1.5 + Math.random() * driftMax,
                driftSpeedX: 0.15 + Math.random() * 0.35,
                driftSpeedY: 0.15 + Math.random() * 0.35,
                hue: Math.random() * 20
            });
        }

        buildParticles();

        // ---------- Interaction (touch + mouse) ----------
        const pointer = { x: -9999, y: -9999, active: false };

        function setPointer(e) {
            const t = e.touches ? e.touches[0] : e;
            pointer.x = t.clientX;
            pointer.y = t.clientY;
            pointer.active = true;
        }
        function clearPointer() {
            pointer.active = false;
            pointer.x = -9999;
            pointer.y = -9999;
        }

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); setPointer(e); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); setPointer(e); }, { passive: false });
        canvas.addEventListener('touchend', clearPointer);
        canvas.addEventListener('touchcancel', clearPointer);

        canvas.addEventListener('mousemove', setPointer);
        canvas.addEventListener('mouseleave', clearPointer);

        // Slightly smaller influence area, especially on phones
        const REPEL_RADIUS = () => Math.min(W, H) * (IS_SMALL ? 0.16 : 0.20);
        // Gentler push (was 3.2) so words nudge aside instead of exploding
        const REPEL_FORCE = 1.1;
        // -------------------------------------------------

        let time = 0;
        function draw() {
            time += 0.016;

            // trailing fade for the glow effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.28)';
            ctx.fillRect(0, 0, W, H);

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const radius = REPEL_RADIUS();

            for (const p of particles) {
                // gentle floating drift around the home spot
                const driftX = Math.sin(time * p.driftSpeedX + p.phase) * p.driftR;
                const driftY = Math.cos(time * p.driftSpeedY + p.phase * 1.7) * p.driftR;
                const targetX = p.homeX + driftX;
                const targetY = p.homeY + driftY;

                // stronger spring so particles return home quickly after a touch
                p.vx += (targetX - p.x) * 0.03;
                p.vy += (targetY - p.y) * 0.03;

                // push away from finger / cursor (soft ease-out curve)
                if (pointer.active) {
                    const dx = p.x - pointer.x;
                    const dy = p.y - pointer.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < radius && dist > 0.01) {
                        const falloff = 1 - dist / radius;
                        const force = falloff * falloff * REPEL_FORCE;
                        p.vx += (dx / dist) * force;
                        p.vy += (dy / dist) * force;
                    }
                }

                // more friction = calmer, smoother settling
                p.vx *= 0.86;
                p.vy *= 0.86;
                p.x += p.vx;
                p.y += p.vy;

                // clamp max speed so nothing ever flies across the screen
                const sp = Math.abs(p.vx) + Math.abs(p.vy);
                const MAX_SPEED = 6;
                if (sp > MAX_SPEED) {
                    const k = MAX_SPEED / sp;
                    p.vx *= k;
                    p.vy *= k;
                }

                // flickering glow
                const flick = 0.75 + 0.25 * Math.sin(time * 2.0 * p.flicker + p.phase);
                const a = Math.min(1, p.alpha * flick);

                // words being pushed glow a bit brighter
                const boost = Math.min(1, sp * 0.15);

                // Readable minimum font size on tiny screens
                const fontSize = Math.max(8, p.size * SCALE * 0.62);
                ctx.font = `${fontSize}px "Segoe UI", Helvetica, Arial, sans-serif`;

                const light = 45 + flick * 10 + boost * 25;
                ctx.fillStyle = `hsla(${p.hue}, 100%, ${light}%, ${a})`;
                ctx.shadowColor = `hsla(${p.hue}, 100%, 55%, ${a})`;
                ctx.shadowBlur = (IS_SMALL ? 6 : 10) + boost * 10;

                ctx.fillText(PHRASE, p.x, p.y);
            }

            ctx.shadowBlur = 0;
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>

</html>
